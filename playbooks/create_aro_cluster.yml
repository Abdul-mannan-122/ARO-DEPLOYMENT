---
#
# Playbook : create_aro_cluster.yml
# Purpose  : Deploy an Azure Red Hat OpenShift cluster.
# Usage    : Run once for Hub DR (aro-mgmt-uaen-01), once for Workload DR (aro-prod-uaen-01).
# Method   : az aro create via azure.azcollection.azure_rm_resource (ARM PUT) because
#             azure_rm_openshiftmanagedcluster does not yet support managed identity clusters.
#             Cluster info/poll  -> azure_rm_openshiftmanagedcluster_info
#             Kubeconfig         -> azure_rm_openshiftmanagedclusterkubeconfig_info
#             Node / CO health   -> kubernetes.core.k8s_info
#             No command/shell module used.
#

- name: Deploy Azure Red Hat OpenShift Cluster
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # ── Required survey inputs ────────────────────────────────────────────
    cluster_name:      "{{ cluster_name }}"
    resource_group:    "{{ resource_group }}"
    vnet_name:         "{{ vnet_name }}"
    pull_secret_path:  "{{ pull_secret_path | default('/tmp/pull-secret.json') }}"

    # ── Defaults (override via survey) ────────────────────────────────────
    location:          "{{ location          | default('uaenorth') }}"
    cp_subnet:         "{{ cp_subnet         | default('snet-prod-aro-cp-uaen-001') }}"
    worker_subnet:     "{{ worker_subnet     | default('snet-prod-aro-worker-uaen-001') }}"
    ocp_version:       "{{ ocp_version       | default('4.18.31') }}"
    cp_vm_size:        "{{ cp_vm_size        | default('Standard_D8ds_v5') }}"
    worker_vm_size:    "{{ worker_vm_size    | default('Standard_D16s_v5') }}"
    worker_count:      "{{ worker_count      | default(3) | int }}"
    domain_prefix:     "{{ cluster_name }}"
    pod_cidr:          "{{ pod_cidr          | default('172.22.0.0/16') }}"
    service_cidr:      "{{ service_cidr      | default('172.23.0.0/16') }}"
    kubeconfig_dest:   "{{ kubeconfig_dest   | default('/tmp/') }}"
    mi_prefix:         "{{ mi_prefix }}"      # wdr or hdr — must match resource_group

  tasks:

    # ── Validate inputs ──────────────────────────────────────────────────
    - name: Validate required variables
      assert:
        that:
          - cluster_name     | length > 0
          - resource_group   | length > 0
          - vnet_name        | length > 0
          - pull_secret_path | length > 0
          - mi_prefix in ["wdr", "hdr"]
        fail_msg: "Missing or invalid required variable. Check survey inputs."

    # ── Get managed identity details ─────────────────────────────────────
    # FIX A: azure_rm_resource_info replaces 'command: az identity show'
    - name: "Get cluster managed identity ({{ mi_prefix }}-aro-cluster)"
      azure.azcollection.azure_rm_resource_info:
        resource_group: "{{ resource_group }}"
        provider: ManagedIdentity
        resource_type: userAssignedIdentities
        resource_name: "{{ mi_prefix }}-aro-cluster"
        api_version: "2023-01-31"
      register: cluster_mi_info

    - name: "Get platform managed identity ({{ mi_prefix }}-aro-platform)"
      azure.azcollection.azure_rm_resource_info:
        resource_group: "{{ resource_group }}"
        provider: ManagedIdentity
        resource_type: userAssignedIdentities
        resource_name: "{{ mi_prefix }}-aro-platform"
        api_version: "2023-01-31"
      register: platform_mi_info

    - name: Set identity facts
      set_fact:
        cluster_mi_client_id:    "{{ cluster_mi_info.response[0].properties.clientId }}"
        platform_mi_resource_id: "{{ platform_mi_info.response[0].id }}"
        cluster_mi_resource_id:  "{{ cluster_mi_info.response[0].id }}"

    - name: Display identity details
      debug:
        msg:
          - "Cluster MI client ID    : {{ cluster_mi_client_id }}"
          - "Platform MI resource ID : {{ platform_mi_resource_id }}"

    # ── Check if cluster already exists ──────────────────────────────────
    # FIX B: azure_rm_openshiftmanagedcluster_info replaces 'command: az aro show'
    - name: Check for existing ARO cluster
      azure.azcollection.azure_rm_openshiftmanagedcluster_info:
        resource_group: "{{ resource_group }}"
        name:           "{{ cluster_name }}"
      register: existing_cluster
      failed_when: false

    - name: Skip creation if cluster already exists
      debug:
        msg: "Cluster {{ cluster_name }} already exists ({{ existing_cluster.clusters[0].provisioning_state | default('unknown') }}). Skipping."
      when: existing_cluster.clusters | default([]) | length > 0

    # ── Create ARO cluster via ARM ────────────────────────────────────────
    # FIX C: azure_rm_resource (ARM PUT) replaces 'command: az aro create'
    # azure_rm_openshiftmanagedcluster does not support managed identity clusters.
    - name: Create ARO cluster via ARM REST API (takes 35-50 minutes)
      azure.azcollection.azure_rm_resource:
        resource_group: "{{ resource_group }}"
        provider:       RedHatOpenShift
        resource_type:  openShiftClusters
        resource_name:  "{{ cluster_name }}"
        api_version:    "2023-11-22"
        method:         PUT
        body:
          location: "{{ location }}"
          identity:
            type: UserAssigned
            userAssignedIdentities:
              "{{ platform_mi_resource_id }}": {}
          properties:
            clusterProfile:
              domain:          "{{ domain_prefix }}.ocp.ishj.ae"
              version:         "{{ ocp_version }}"
              pullSecret:      "{{ lookup('file', pull_secret_path) }}"
              resourceGroupId: "/subscriptions/{{ lookup('env','AZURE_SUBSCRIPTION_ID') }}/resourceGroups/{{ resource_group }}"
            clusterIdentity:
              resourceID: "{{ cluster_mi_resource_id }}"
            platformWorkloadIdentityProfile:
              platformWorkloadIdentities:
                "aro-operator-master":
                  resourceID: "{{ platform_mi_resource_id }}"
            networkProfile:
              podCidr:          "{{ pod_cidr }}"
              serviceCidr:      "{{ service_cidr }}"
              outboundType:     UserDefinedRouting
              preconfiguredNSG: Enabled
            masterProfile:
              vmSize:   "{{ cp_vm_size }}"
              subnetID: "/subscriptions/{{ lookup('env','AZURE_SUBSCRIPTION_ID') }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/virtualNetworks/{{ vnet_name }}/subnets/{{ cp_subnet }}"
            workerProfiles:
              - name:       worker
                vmSize:     "{{ worker_vm_size }}"
                subnetID:   "/subscriptions/{{ lookup('env','AZURE_SUBSCRIPTION_ID') }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/virtualNetworks/{{ vnet_name }}/subnets/{{ worker_subnet }}"
                count:      "{{ worker_count | int }}"
                diskSizeGB: 128
            apiserverProfile:
              visibility: Private
            ingressProfiles:
              - name:       default
                visibility: Private
      register: create_result
      when: existing_cluster.clusters | default([]) | length == 0

    # ── Poll until Succeeded ──────────────────────────────────────────────
    # FIX D: azure_rm_openshiftmanagedcluster_info replaces 'command: az aro show'
    - name: Poll ARO cluster provisioning state
      azure.azcollection.azure_rm_openshiftmanagedcluster_info:
        resource_group: "{{ resource_group }}"
        name:           "{{ cluster_name }}"
      register: cluster_state
      until: >
        cluster_state.clusters[0].provisioning_state in
        ['Succeeded', 'Failed', 'Canceled']
      retries: 70
      delay:   60

    - name: Fail if provisioning did not succeed
      fail:
        msg: "Cluster {{ cluster_name }} state: {{ cluster_state.clusters[0].provisioning_state }}. Check Azure portal."
      when: cluster_state.clusters[0].provisioning_state != 'Succeeded'

    # ── Retrieve cluster endpoints ────────────────────────────────────────
    # FIX E: Extract from already-registered cluster_state — no extra commands needed
    - name: Set cluster endpoint facts
      set_fact:
        api_url:     "{{ cluster_state.clusters[0].api_server_url }}"
        console_url: "{{ cluster_state.clusters[0].console_url }}"

    # ── Download admin kubeconfig ─────────────────────────────────────────
    # FIX F: azure_rm_openshiftmanagedclusterkubeconfig_info replaces
    #         'command: az aro get-admin-kubeconfig'
    - name: Download admin kubeconfig
      azure.azcollection.azure_rm_openshiftmanagedclusterkubeconfig_info:
        name:           "{{ cluster_name }}"
        resource_group: "{{ resource_group }}"
        path:           "{{ kubeconfig_dest }}/{{ cluster_name }}.kubeconfig"

    # ── Verify cluster health ─────────────────────────────────────────────
    - name: Get node status
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_dest }}/{{ cluster_name }}.kubeconfig"
        kind: Node
      register: nodes

    - name: Count ready nodes
      set_fact:
        ready_nodes: >-
          {{ nodes.resources
             | selectattr('status.conditions', 'defined')
             | map(attribute='status.conditions') | flatten
             | selectattr('type', 'equalto', 'Ready')
             | selectattr('status', 'equalto', 'True')
             | list | length }}

    # FIX G: kubernetes.core.k8s_info replaces 'command: oc get clusteroperators'
    - name: Get cluster operator status
      kubernetes.core.k8s_info:
        kubeconfig:  "{{ kubeconfig_dest }}/{{ cluster_name }}.kubeconfig"
        api_version: config.openshift.io/v1
        kind:        ClusterOperator
      register: cluster_operators

    - name: Check for degraded cluster operators
      set_fact:
        degraded_cos: >-
          {{ cluster_operators.resources
             | selectattr('status.conditions', 'defined')
             | map(attribute='status.conditions') | flatten
             | selectattr('type', 'equalto', 'Degraded')
             | selectattr('status', 'equalto', 'True')
             | map(attribute='message') | list }}

    # ── Final summary ─────────────────────────────────────────────────────
    - name: Deployment summary
      debug:
        msg:
          - "╔══════════════════════════════════════════════╗"
          - "║          ARO Cluster Ready                   ║"
          - "╚══════════════════════════════════════════════╝"
          - "Cluster        : {{ cluster_name }}"
          - "Resource Group : {{ resource_group }}"
          - "State          : {{ cluster_state.clusters[0].provisioning_state }}"
          - "API URL        : {{ api_url }}"
          - "Console URL    : {{ console_url }}"
          - "Ready Nodes    : {{ ready_nodes }}"
          - "Degraded COs   : {{ degraded_cos | length }}"
          - "Kubeconfig     : {{ kubeconfig_dest }}/{{ cluster_name }}.kubeconfig"
          - "OCP Version    : {{ ocp_version }}"
